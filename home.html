<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- tailwind and daisy link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font-awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100">

    <!-- navbar -->
    <nav>
       <div class="navbar   bg-base-100 shadow-sm">
        <div class="flex-1">
        <div class="flex">
            <div class="w-10 rounded-full">
            <img
                alt="Tailwind CSS Navbar component"
                src="./assets/github-logo.png" />
            </div>
            <a class="btn btn-ghost text-lg md:text-xl">Github Issue Tracker</a>
        </div>
  </div>
  <div class="flex gap-2 ">
    <!-- search input -->
        <label class="input  w-[100px] md:w-full max-w-md">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" required placeholder="Search  Issues" />
        </label>
            <button class="btn btn-primary">Search</button>
        </div>
     </div>
    </nav>


    <main>
    <!-- main tabs -->
        <div class="flex gap-2 w-10/12 mx-auto mt-20 bg-white p-4 rounded shadow-2xs">
            <button id="all-btn" onclick="toggleBtn('all-btn')" class="btn bg-[#570DF8] text-white min-w-[100px]">All</button>
            <button id="open-btn" onclick="toggleBtn('open-btn')" class="btn bg-white min-w-[100px] ">Open</button>
            <button id="close-btn" onclick="toggleBtn('close-btn')" class="btn bg-white min-w-[100px]">Closed</button>
         </div>

    <!-- all issue cards -->
         <section id="all-card-container">

         </section>
    </main>
</body>
</html>
