<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- tailwind and daisy link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font-awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100">

    <!-- navbar -->
    <nav>
       <div class="navbar   bg-base-100 shadow-sm">
        <div class="flex-1">
        <div class="flex">
            <div class="w-10 rounded-full">
            <img
                alt="Tailwind CSS Navbar component"
                src="./assets/github-logo.png" />
            </div>
            <a class="btn btn-ghost text-lg md:text-xl">Github Issue Tracker</a>
        </div>
  </div>
  <div class="flex gap-2 ">
    <!-- search input -->
        <label class="input  w-[100px] md:w-full max-w-md">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" required placeholder="Search  Issues" />
        </label>
            <button class="btn btn-primary">Search</button>
        </div>
     </div>
    </nav>


    <main class="w-10/12 mx-auto">
    <!-- main tabs -->
        <div class="flex gap-2  mt-20 bg-white p-4 rounded shadow-xs">
            <button id="all-btn" onclick="toggleBtn('all-btn')" class="btn bg-[#570DF8] text-white min-w-[100px]">All</button>
            <button id="open-btn" onclick="toggleBtn('open-btn')" class="btn bg-white min-w-[100px] ">Open</button>
            <button id="close-btn" onclick="toggleBtn('close-btn')" class="btn bg-white min-w-[100px]">Closed</button>
         </div>

    <!-- main section -->
         <section class=" bg-white my-4 rounded">

            <!-- count and open and closed sign -->
            <div class="flex justify-between items-center p-3 mt-4 border-b border-gray-400 ">
                <!-- card count div -->
                <div class="flex gap-2 items-center">
                    <div class="border border-[#570DF8] w-10 h-10 rounded-full bg-purple-100 p-1 flex ">
                    <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class=" ">
                        <h3 class="text-xl font-semibold md:text-2xl">50 Issues</h3>
                        <p class="text-xs font-semibold md:text-sm">Track and manage your project issues</p>
                    </div>
                    
                </div>
                <!-- open and closed sign -->
                <div class="flex  gap-3 font-semibold text-sm md:text-sm md:mx-8 md:gap-6">
                    <p><i class="fa-solid fa-circle text-emerald-600"></i> Open</p>
                    <p><i class="fa-solid fa-circle text-[#570DF8]"></i> Closed</p>
                </div>
            </div>

            <!-- card-container -->
             <div id="card-container" class="my-4 grid justify-center md:grid-cols-4 sm:grid-cols-2">
                <!-- card demo -->
                 <div class="card bg-base-100 w-96 shadow-sm">
            
                <div class="card-body space-y-1">
                    <div class="flex  justify-between">
                        <div class="flex ">
                            <img src="./assets/Open-Status.png" alt="">
                        </div>
                        <div class="badge badge-outline badge-secondary">NEW</div>
                    </div>
                    <div  >
                        <h2 class="card-title">
                        Fix navigation menu on mobile devices</h2>
                        <p class="line-clamp-2 text-gray-700">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                        <div class="card-actions justify-start my-2">
                        <div class="badge badge-outline"> <i class="fa-solid fa-bug"></i> Fashion</div>
                        <div class="badge badge-outline"><img src="./assets/vector.png" alt="">Products</div>
                        </div>
                    </div>
                     <div class="border-t border-gray-300 pt-4 text-gray-700 space-y-2 text-base">
                        <p >#1by john_doe</p>
                        <p>51/02/2024</p>
                     </div>
                </div>
                </div>
             </div>
        </section>
    </main>
</body>
</html>
